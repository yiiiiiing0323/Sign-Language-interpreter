<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統設定</title>
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <header class="top-navbar">
        <button class="menu-toggle-btn" id="menuToggle">☰</button>
        <div class="navbar-center-title">系統設定</div>
        <div class="user-menu-container">
            <div class="user-avatar" id="userIcon">👤</div>
            <div class="dropdown-menu" id="userDropdown">
                <a href="settings.html">設定</a>
                <a href="javascript:void(0)" onclick="openLogoutModal()">登出</a>
            </div>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar-menu" id="sidebarMenu">
        <div class="sidebar-header">
            <span class="sidebar-logo">🚀 系統選單</span>
            <button class="close-sidebar-btn" id="closeSidebar">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="home.html" class="sidebar-item">📋 系統介紹</a>
            <a href="operation.html" class="sidebar-item">📖 操作說明</a>
            <a href="record.html" class="sidebar-item">🕒 歷史紀錄</a>
            <a href="translate.html" class="sidebar-item">🤖 AI 智能助理</a>
        </nav>
    </aside>

    <main class="content-container settings-layout">
        <aside class="settings-tabs">
            <button class="tab-btn active" data-tab="account">👤 個人資料</button>
            <button class="tab-btn" data-tab="preference">⚙️ 偏好設定</button>
            <button class="tab-btn" data-tab="security">🔒 安全與隱私</button>
        </aside>

        <section class="settings-panels">
            <div class="tab-panel active" id="panel-account">
                <h2>個人資料</h2>
                <p class="panel-desc">管理您的工作台帳戶公開資訊。</p>
                <hr>
                <div class="form-group">
                    <label class="form-label">使用者名稱</label>
                    <input type="text" class="form-input" value="測試使用者">
                </div>
                <div class="form-group">
                    <label class="form-label">電子郵件</label>
                    <input type="email" class="form-input" value="user@example.com" disabled>
                    <span class="form-hint">電子郵件綁定後無法自行修改。</span>
                </div>
            </div>

            <div class="tab-panel" id="panel-preference">
                <h2>偏好設定</h2>
                <p class="panel-desc">調整您在工作台中的客製化操作體驗。</p>
                <hr>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">主題深色模式 (開發中)</span>
                        <span class="setting-hint">切換系統整體介面外觀。</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" disabled>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div class="setting-info">
                        <span class="setting-label">通知音效</span>
                        <span class="setting-hint">當 AI 翻譯完成或有新紀錄時播放提示音。</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="tab-panel" id="panel-security">
                <h2>安全與隱私</h2>
                <p class="panel-desc">保障您的帳號安全與數據隱私。</p>
                <hr>
                <div class="form-group">
                    <label class="form-label">修改密碼</label>
                    <input type="password" class="form-input" placeholder="請輸入舊密碼">
                    <input type="password" class="form-input" placeholder="請輸入新密碼" style="margin-top: 10px;">
                </div>
            </div>

            <footer class="settings-action-bar">
                <button class="btn-save" id="saveSettingsBtn">儲存變更</button>
            </footer>
        </section>
    </main>

    <script src="settings.js"></script>
</body>
</html>
