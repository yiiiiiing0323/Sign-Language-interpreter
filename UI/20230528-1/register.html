<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊帳號</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="components.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <h1 class="auth-title">建立新帳號</h1>
        <p class="auth-subtitle">加入系統以開始使用所有 AI 智能工具</p>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label" for="username">使用者名稱</label>
                <input type="text" id="username" class="form-input" placeholder="請輸入使用者名稱" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">電子郵件 (Email)</label>
                <input type="email" id="email" class="form-input" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">設定密碼</label>
                <input type="password" id="password" class="form-input" placeholder="請輸入密碼 (至少 6 位元)" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">確認密碼</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="請再次輸入密碼" required>
            </div>

            <div id="errorMessage" class="error-msg hidden"></div>

            <button type="submit" class="btn-auth">註冊帳號</button>
        </form>

        <div class="auth-footer">
            已有帳號？ <a href="login.html" class="auth-link">立即登入</a>
        </div>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');

            // 簡易驗證密碼是否一致
            if (password !== confirmPassword) {
                errorDiv.textContent = "❌ 兩次輸入的密碼不相同！";
                errorDiv.classList.remove('hidden');
                return;
            }

            errorDiv.classList.add('hidden');
            alert('註冊成功！將為您跳轉至登入頁面。');
            window.location.href = 'login.html';
        }
    </script>
    <script src="register.js"></script>
</body>
</html>
