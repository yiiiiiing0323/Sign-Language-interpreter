<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace</title>
    <link rel="stylesheet" href="translate1.css">
</head>
<body class="meet-page">

    <header class="top-nav">
        <div class="nav-left">
            <!-- <div class="bookmark-item">📑</div>
            <div class="bookmark-item">☁️</div>
            <div class="bookmark-item">📝</div> -->
            <button class="nav-btn" id="settingsBtn">⚙️ 設定</button>
        </div>
        <div class="nav-right">
            <span id="currentTime">12:00:00</span>
            
            <button class="nav-btn exit" id="exitBtn">🚪 退出</button>
        </div>
    </header>

    <main class="meeting-container">
        <section class="tile section-me">
            <div class="video-container">
                <video id="selfVideo" autoplay muted playsinline class="video-content"></video>
                <div id="selfPlaceholder" class="avatar-placeholder">我</div>
            </div>
            <div class="local-controls">
                <button class="ctrl" id="recordBtn">🎤</button>
                <button class="ctrl" id="camBtn">📹</button>
            </div>
            <div id="recordStatus" class="status-dot"></div>
        </section>

        <section class="tile section-ai">
            <div class="video-container">
                <div class="avatar-placeholder">AI</div>
            </div>
        </section>

        <section class="tile section-chat" id="chatPanel">
            <div class="chat-header">
                <span>翻譯與訊息</span>
                <button id="toggleChat">◀ 收起</button>
            </div>
            
            <div class="chat-area" id="chatArea">
                </div>

            <div class="chat-input-wrapper">
                <input type="text" placeholder="輸入訊息..." id="chatInput">
                <button class="send-btn">Send</button>
            </div>
        </section>

        <button id="expandChat" class="expand-btn hidden">展開訊息 ▶</button>
    </main>

    <script src="translate1.js"></script>
</body>
</html>
