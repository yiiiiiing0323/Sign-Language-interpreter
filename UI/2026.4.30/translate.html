<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meeting Workstation</title>
    <link rel="stylesheet" href="translate.css">
</head>
<body class="meet-page">

    <nav class="bookmark-bar">
        <div class="bookmark-item" title="常用連結">📑</div>
        <div class="bookmark-item" title="雲端硬碟">☁️</div>
        <div class="bookmark-item" title="會議記錄">📝</div>
    </nav>

    <main class="meeting-container">
        <section class="tile section-me">
            <div class="video-wrapper">
                <video id="selfVideo" autoplay muted playsinline></video>
                <div class="avatar-placeholder">我</div>
            </div>
            <div class="local-controls">
                <button class="ctrl mic" id="recordBtn">🎤</button>
                <button class="ctrl cam" id="camBtn">📹</button>
            </div>
            <div id="recordStatus" class="status-dot"></div>
        </section>

        <section class="tile section-ai">
            <div class="video-wrapper">
                <div class="avatar-placeholder">AI</div>
            </div>
        </section>

        <section class="tile section-chat" id="chatPanel">
            <div class="chat-header">
                <span>翻譯與訊息</span>
                <button id="toggleChat">◀ 收起</button>
            </div>
            
            <div class="chat-area">
                <div class="msg-ai"><span class="label">(AI 翻譯)</span><p class="bubble">翻譯內容...</p></div>
                <div class="msg-me"><p class="bubble">你好！</p></div>
            </div>

            <div class="chat-input-bar">
                <input type="text" placeholder="輸入訊息...">
            </div>
        </section>

        <button id="expandChat" class="expand-btn hidden">展開訊息 ▶</button>
    </main>

    <script src="translate.js"></script>
</body>
</html>
