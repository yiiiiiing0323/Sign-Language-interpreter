<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Home</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

<header class="top-navbar">
    <!-- 左側導航連結 -->
    <nav class="nav-links">
        <a href="#" class="nav-item">Info</a>
        <span class="divider">|</span>
        <a href="#" class="nav-item">操作說明</a>
        <span class="divider">|</span>
        <a href="#" class="nav-item">紀錄</a>
        <span class="divider">|</span>
        <a href="#" class="nav-item">AI</a>
    </nav>

    <!-- 右側個人資料與下拉選單 -->
    <div class="user-menu-container">
        <div class="user-avatar" id="userIcon">👤</div>
        <div class="dropdown-menu" id="userDropdown">
            <a href="#">profile</a>
            <a href="settings.html">setting</a>
            <a href="index.html" class="logout-link">logout</a>
        </div>
    </div>
</header>

<main class="content-container">
    <div class="action-box">
    </div>
</main>

<!-- 發起會議的彈窗 (保持原本功能) -->
<div class="modal-overlay" id="meeting-modal">
    <div class="modal-content">
        <h2>設定會議資料</h2>
        <div class="form-group">
            <label for="my-ai">我的 AI 語言模型</label>
            <select id="my-ai">
                <option value="gpt-4">GPT-4</option>
                <option value="gpt-3.5">GPT-3.5</option>
            </select>
        </div>
        <div class="form-group">
            <label for="peer-ai">對方 AI 語言模型</label>
            <select id="peer-ai">
                <option value="gpt-4">GPT-4</option>
                <option value="gpt-3.5">GPT-3.5</option>
            </select>
        </div>
        <div class="modal-buttons">
            <button class="btn-primary" id="confirm-meeting">發起</button>
            <button class="btn-cancel" id="cancel-meeting">取消</button>
        </div>
    </div>
</div>

<script src="home.js"></script>
</body>
</html>
