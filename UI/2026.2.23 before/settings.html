<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>帳號設定</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <div class="logo">LOGO</div>
    </div>

    <div class="nav-right">
        <a href="home.html" class="btn-primary">回首頁</a>
    </div>
</header>

<div class="settings-layout">
    <aside class="settings-sidebar">
        <div class="settings-item active">帳號資訊</div>
        <div class="settings-item">安全性</div>
        <div class="settings-item">通知設定</div>
    </aside>

    <main class="settings-content">
        <h1>帳號設定</h1>

        <section class="settings-card">
            <h2>基本資料</h2>

            <div class="form-group">
                <label>使用者名稱</label>
                <input type="text" placeholder="請輸入名稱">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="example@email.com">
            </div>

            <button class="btn-primary">儲存變更</button>
        </section>
    </main>
</div>

</body>
</html>
