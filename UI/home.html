<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Meeting Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <div class="hamburger-menu">☰</div>
        <div class="logo">LOGO</div>
    </div>
    <div class="account-menu">
    <div class="account-icon">Member</div>

    <div class="account-dropdown">
        <a href="settings.html">帳號設定</a>
        <a href="index.html" class="logout">登出</a>
    </div>
</div>

</header>

<div class="main-layout">
    <aside class="sidebar">
        <a class="sidebar-item active">Meeting</a>
        <a class="sidebar-item">Record</a>
    </aside>

    <main class="meeting-content">
        <button class="btn-start-meeting">發起會議</button>

        <div class="join-area">
            <input type="text" placeholder="輸入代碼或連結">
            <button id="join-btn" class="btn-primary">加入</button>
        </div>
    </main>
</div>

<!-- Floating Modal -->
<div class="modal-overlay" id="meeting-modal">
    <div class="modal-content">
        <h2>設定會議資料</h2>

        <div class="form-group">
            <label for="my-ai">我的 AI 語言模型</label>
            <select id="my-ai">
                <option value="gpt-4">GPT-4</option>
                <option value="gpt-3.5">GPT-3.5</option>
            </select>
        </div>

        <div class="form-group">
            <label for="peer-ai">對方 AI 語言模型</label>
            <select id="peer-ai">
                <option value="gpt-4">GPT-4</option>
                <option value="gpt-3.5">GPT-3.5</option>
            </select>
        </div>

        <div class="modal-buttons">
            <button class="btn-primary" id="confirm-meeting">發起</button>
            <button class="btn-cancel" id="cancel-meeting">取消</button>
        </div>
    </div>
</div>


<script src="home.js"></script>
</body>
</html>
